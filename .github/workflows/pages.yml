name: Publish opkg feed (GitHub Pages)

# Builds the .ipk + opkg index (Packages/Packages.gz) and publishes them to
# GitHub Pages, so users can add a custom feed and `opkg update && opkg install`
# vpnpool directly. Our packages are arch-independent (_all), so one feed serves
# every router; dependencies (sing-box, …) come from the stock OpenWrt feeds.

on:
  push:
    branches: [ main ]
    paths:
      - 'package/**'
      - '.github/workflows/pages.yml'
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # See build.yml: pack loose objects so the SDK action's chown can't race
      # git maintenance on .git/objects (intermittent "chown: cannot access").
      - name: Pack git objects (avoid gh-action-sdk chown race)
        run: |
          git config gc.auto 0
          git repack -ad || true
          git gc --prune=now || true

      - name: Build packages + index (OpenWrt SDK)
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-24.10.4
          FEEDNAME: vpnpool
          PACKAGES: vpnpool luci-app-vpnpool
          INDEX: 1
          # usign secret key (key-build) -> opkg feed gets a signed Packages.sig,
          # so users keep opkg signature verification ON. Public key is in
          # keys/vpnpool-feed.pub (fingerprint 807479500e0ce219) and published
          # below for users to install into /etc/opkg/keys/.
          KEY_BUILD: ${{ secrets.USIGN_KEY_BUILD }}

      - name: Assemble feed
        run: |
          mkdir -p public
          # our packages
          find bin \( -name 'vpnpool_*.ipk' -o -name 'luci-app-vpnpool_*.ipk' \) -exec cp {} public/ \;
          # opkg index produced by the SDK for our feed (signed: Packages.sig)
          find bin -path '*vpnpool*' \( -name 'Packages' -o -name 'Packages.gz' -o -name 'Packages.sig' \) -exec cp {} public/ \; || true
          # publish the usign public key so users can verify the feed signature
          cp keys/vpnpool-feed.pub public/vpnpool-feed.pub
          # landing page
          cat > public/index.html <<'HTML'
          <!doctype html><meta charset=utf-8><title>vpnpool opkg feed</title>
          <h1>vpnpool — OpenWrt opkg feed</h1>
          <p>The feed is <b>signed</b> (usign, fingerprint 807479500e0ce219). Install the public key once, then add the feed:</p>
          <pre>wget -O /etc/opkg/keys/807479500e0ce219 https://roman-png.github.io/VPNpool/vpnpool-feed.pub
          echo "src/gz vpnpool https://roman-png.github.io/VPNpool" &gt;&gt; /etc/opkg/customfeeds.conf
          opkg update
          opkg install luci-app-vpnpool</pre>
          <p><a href="https://github.com/roman-png/VPNpool">Project on GitHub</a></p>
          HTML
          echo "=== feed contents ==="; ls -l public
          if [ ! -f public/Packages.sig ]; then echo "WARNING: Packages.sig missing — feed is NOT signed"; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build-feed
    runs-on: ubuntu-latest
    #environment:
    #  name: github-pages
    #  url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
